# Lives at .github/workflows/publish-mcp.yml in the PUBLIC repo
# (github.com/amitesh-m/wealthville-integrations). Kept here in the private
# mirror for reference — the mirror script copies it into place.
#
# Trigger: push a tag like v0.1.2 → publishes @wealthville/mcp-server to npm and
# then to the official MCP registry (both over GitHub OIDC; repo ownership grants
# the io.github.amitesh-m/* registry namespace).
#
# npm auth uses OIDC Trusted Publishing when a Trusted Publisher is configured on
# npmjs.com for this package (Settings → Trusted Publisher → this repo +
# publish-mcp.yml). Until then it falls back to the NPM_TOKEN secret — the newer
# npm CLI prefers OIDC automatically and uses the token only if OIDC is
# unavailable, so both work with no edit. Once the Trusted Publisher is live the
# secret can be deleted. --provenance signs the release via the same OIDC token.
name: Publish MCP server (npm + registry)
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — used for both npm trusted publishing and mcp-publisher
      contents: read
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      # OIDC trusted publishing + --provenance need npm >= 11.5.1; lts/* still
      # ships npm 10.x, so upgrade the CLI before publishing.
      - name: Upgrade npm (OIDC trusted publishing support)
        run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - name: Sync versions from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
      - name: Publish to npm (OIDC trusted publishing; token fallback; skip if version exists)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@wealthville/mcp-server@$VERSION" version >/dev/null 2>&1; then
            echo "npm already has $VERSION - skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Login to MCP registry (OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP registry
        run: ./mcp-publisher publish
